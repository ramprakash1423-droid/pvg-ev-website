<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">PVG-EV mobile charging unit in an apartment community parking area</title>
  <desc id="desc">A PVG-EV mobile charging vehicle connected to a resident EV in an approved charging bay inside a gated residential community.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fffc"/>
      <stop offset=".48" stop-color="#ecf9ff"/>
      <stop offset="1" stop-color="#f2fff8"/>
    </linearGradient>
    <linearGradient id="energy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5ff"/>
      <stop offset="1" stop-color="#08a66a"/>
    </linearGradient>
    <linearGradient id="truck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#def4ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#0a2d38" flood-opacity=".17"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1400" height="820" rx="42" fill="url(#bg)"/>
  <circle cx="1058" cy="148" r="240" fill="#0ea5ff" opacity=".08"/>
  <circle cx="258" cy="642" r="250" fill="#08a66a" opacity=".08"/>

  <g filter="url(#softShadow)" opacity=".96">
    <rect x="92" y="110" width="225" height="270" rx="30" fill="#ffffff"/>
    <rect x="344" y="78" width="250" height="302" rx="32" fill="#ffffff"/>
    <path d="M124 168h162M124 226h162M124 284h162M380 140h178M380 198h178M380 256h178M380 314h178" stroke="#d7edf7" stroke-width="24"/>
    <text x="112" y="424" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850" fill="#17202a">GATED COMMUNITY PARKING</text>
  </g>

  <g opacity=".78">
    <path d="M160 515h1080" stroke="#d8ebee" stroke-width="2"/>
    <path d="M180 585h1040" stroke="#d8ebee" stroke-width="2"/>
    <path d="M230 655h940" stroke="#d8ebee" stroke-width="2"/>
  </g>

  <rect x="248" y="462" width="880" height="205" rx="48" fill="#ffffff" opacity=".35"/>
  <rect x="248" y="462" width="880" height="205" rx="48" fill="none" stroke="#08a66a" stroke-width="4" stroke-dasharray="18 15" opacity=".48"/>
  <text x="286" y="510" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#087f56">TEMPORARY APPROVED CHARGING BAY</text>

  <g filter="url(#softShadow)">
    <g transform="translate(378 528)">
      <rect x="0" y="34" width="202" height="84" rx="30" fill="#ffffff"/>
      <path d="M44 20h94c36 0 62 20 70 55H5c7-34 21-55 39-55z" fill="#eef8fd"/>
      <rect x="136" y="47" width="46" height="26" rx="8" fill="#174b5c"/>
      <rect x="28" y="62" width="62" height="14" rx="7" fill="url(#energy)" opacity=".78"/>
      <circle cx="47" cy="116" r="22" fill="#17202a"/>
      <circle cx="47" cy="116" r="11" fill="#f8feff"/>
      <circle cx="158" cy="116" r="22" fill="#17202a"/>
      <circle cx="158" cy="116" r="11" fill="#f8feff"/>
      <text x="26" y="98" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#17202a">RESIDENT EV</text>
    </g>
    <g transform="translate(792 354)">
      <rect x="132" y="144" width="330" height="176" rx="34" fill="url(#truck)" stroke="#c8eaf4" stroke-width="3"/>
      <path d="M28 190h122v130H26c-16 0-26-10-26-26v-38c0-40 20-66 28-66z" fill="#ffffff" stroke="#c8eaf4" stroke-width="3"/>
      <path d="M54 154h86c27 0 47 18 52 48H20c7-30 19-48 34-48z" fill="#e9f8ff" stroke="#c8eaf4" stroke-width="3"/>
      <rect x="98" y="202" width="50" height="30" rx="8" fill="#174b5c"/>
      <text x="174" y="220" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#08a66a">PVG-EV</text>
      <text x="176" y="256" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#314555">Mobile Charging Unit</text>
      <rect x="298" y="174" width="92" height="62" rx="14" fill="#174b5c" opacity=".92"/>
      <circle cx="76" cy="320" r="28" fill="#17202a"/>
      <circle cx="76" cy="320" r="14" fill="#f8feff"/>
      <circle cx="380" cy="320" r="28" fill="#17202a"/>
      <circle cx="380" cy="320" r="14" fill="#f8feff"/>
      <circle cx="158" cy="268" r="12" fill="#08a66a"/>
      <circle cx="194" cy="268" r="12" fill="#0ea5ff"/>
    </g>
  </g>

  <path d="M925 574 C786 554 704 566 582 594" fill="none" stroke="#0d2430" stroke-width="12" stroke-linecap="round"/>
  <path d="M925 574 C786 554 704 566 582 594" fill="none" stroke="url(#energy)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="582" cy="594" r="14" fill="#08a66a"/>

  <g opacity=".95">
    <rect x="1002" y="104" width="226" height="58" rx="29" fill="#ffffff" opacity=".78"/>
    <text x="1030" y="141" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#087f56">PROPERTY REVIEW</text>
  </g>

  <g>
    <path d="M276 684h34l-17-62z" fill="#ffb020"/>
    <path d="M1110 684h34l-17-62z" fill="#ffb020"/>
    <rect x="267" y="684" width="52" height="13" rx="6" fill="#17202a"/>
    <rect x="1101" y="684" width="52" height="13" rx="6" fill="#17202a"/>
  </g>
</svg>
